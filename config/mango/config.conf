monitorrule=name:eDP-1,width:1920,height:1080,refresh:60,x:0,y:10,scale:1.0,vrr:1

# Overview settings
enable_hotarea=1
hotarea_size=10
hotarea_corner=0
overviewgappi=10
overviewgappo=30

repeat_rate=60
repeat_delay=300
numlockon=0
xkb_rules_layout=us

# Touchpad settings
trackpad_natural_scrolling=1
accel_speed=1
accel_profile=2
axis_scroll_factor=3.0
cursor_theme=Bibata-Modern-Ice
cursor_size=24
sloppyfocus=1


# Start on boot
exec-once=bash $HOME/.config/SwayBg/random-wall.sh
exec-once=swaync
exec-once=kitty
exec-once=wl-paste --type image --watch cliphist store
exec-once=wl-paste --type text --watch cliphist store
exec-once=kdeconnect-indicator
exec-once=waybar -c $HOME/.config/waybar/MangoWC/config.jsonc -s $HOME/.config/waybar/MangoWC/style.css


# Application Keybinds
bind=SUPER,t,spawn,kitty
bind=SUPER,m,spawn,Telegram
bind=SUPER,b,spawn,librewolf
bind=SUPER,w,spawn,bash $HOME/.config/SwayBg/random-wall.sh
bind=SUPER+CTRL,c,spawn_shell,pkill rofi ||cliphist list | rofi -dmenu -display-columns 2 -theme ~/Dotfiles/config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind=SUPER+CTRL,delete,spawn_shell,cliphist wipe
bind=SUPER,space,spawn_shell,pkill rofi || rofi -show drun
bind=SUPER,r,spawn,bash $HOME/.config/mango/rebar.sh
bind=SUPER,n,spawn,kitty -e yazi
bind=SUPER,x,spawn,kitty -e cmus
bind=SUPER,p,spawn_shell,pkill wlogout || wlogout
bind=SUPER+CTRL,e,quit
bind=SUPER+CTRL,n,spawn,swaync-client -t -sw
bind=SUPER+CTRL,l,spawn,bash ~/.config/hypr/randomwall.sh


bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9


bind=SUPER,q,killclient
bind=SUPER,r,reload_config

# Layouts
bind=SUPER,l,switch_layout
bind=SUPER,g,togglegaps
bind=SUPER,o,toggleoverview

# Layouts in mango are per tag. So we'll set all tags to tile by default. 
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

gappih=5
gappiv=5
gappoh=5
gappov=5
borderpx=4
border_radius=24
no_border_when_single=1
focuscolor=0xcba6f7ff

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Mouse Wheel Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# options
repeat_rate=35
repeat_delay=600

# Effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 4
blur_params_radius = 6
blur_params_noise = 0.02
blur_params_brightness = 1.0
blur_params_contrast = 1.0
blur_params_saturation = 1.5

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.6
zoom_end_ratio=0.6
fadein_begin_opacity=0.8
fadeout_begin_opacity=0.8
animation_duration_move=400
animation_duration_open=400
animation_duration_tag=400
animation_duration_close=400
animation_curve_open=0.46,1.0,0.29,1.2
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.30,1.2
animation_curve_close=0.08,0.92,0,1

# Scroller Layout Setting
scroller_structs=10
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER,v,togglefloating,
bind=SUPER,f,togglefullscreen,

# Default size of new window
default_mfact=0.5

# smartmovewin
bind=CTRL+SHIFT,Up,smartmovewin,up
bind=CTRL+SHIFT,Down,smartmovewin,down
bind=CTRL+SHIFT,Left,smartmovewin,left
bind=CTRL+SHIFT,Right,smartmovewin,right

# switch window focus
bind=SUPER,Down,focusstack,next
bind=SUPER,Up,focusstack,prev
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# workspace switching
bind=SUPER+CTRL,Left,tag,next
bind=SUPER+CTRL,Right,tag,next

# Move windows to workspace
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# Gesturebind
gesturebind=none,left,3,focusdir,right
gesturebind=none,right,3,focusdir,left
gesturebind=none,up,3,focusdir,down
gesturebind=none,down,3,focusdir,up
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview

# Screenshots KeyBinds
bindl=CTRL+SUPER,R,spawn,bash $HOME/.config/mango/partial_screenshot.sh
bindl=CTRL+SUPER,S,spawn,bash $HOME/.config/mango/full_screenshot.sh
# the rule is to avoid occlusion and ghosting
layerrule=noanim:1,noblur:1,layer_name:selection

# Laptop multimedia keys for volume and LCD brightness
bind = NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 10%+
bind = NONE,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 10%-
bind = NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = NONE,XF86MonBrightnessUp,spawn,brightnessctl s 10%+
bind = NONE,XF86MonBrightnessDown,spawn,brightnessctl s 10%-

# Requires playerctl
bind = NONE,XF86AudioNext,spawn,playerctl next
bind = NONE,XF86AudioPause,spawn,playerctl play-pause
bind = NONE,XF86AudioPlay,spawn,playerctl play-pause
bind = NONE,XF86AudioPrev,spawn,playerctl previous

# window rules
windowrule=title:Authentication required,isfloating:1
windowrule=title:Keybindings,isfloating:1
windowrule=title:Rename*,isfloating:1
windowrule=title:Compressing*,isfloating:1
windowrule=title:File Already Exists*,isfloating:1
windowrule=title:Extracting Files*,isfloating:1
windowrule=title:File Operation Progress*,isfloating:1
windowrule=title:Confirm to replace files*,isfloating:1
windowrule=appid:clipse,isfloating:1,width:600,height:800
windowrule=title:Mission Center,isfloating:1,width:1400,height:800


# fcitx5 im
env=GTK_IM_MODULE,fcitx
env=QT_IM_MODULE,fcitx
env=SDL_IM_MODULE,fcitx
env=XMODIFIERS,@im=fcitx
env=GLFW_IM_MODULE,ibus

# scale factor about qt (herr is 1.4)
env=QT_QPA_PLATFORMTHEME,qt6ct
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_QPA_PLATFORM,Wayland;xcb
env=QT_WAYLAND_FORCE_DPI,100
env=XDG_SESSION_TYPE,wayland
env=GDK_BACKEND,wayland,x11
env=CLUTTER_BACKEND,wayland

# firefox
env = MOZ_ENABLE_WAYLAND,1

# electron >28 apps (may help)
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Binds for lid fold toggle
switchbind=fold,spawn,bash ~/.config/hypr/randomwall.sh
switchbind=unfold,spawn,wlr-dpms on
