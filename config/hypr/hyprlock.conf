# BACKGROUND
background {
    path = ~/.cache/hyprlock_wall.png
    blur_size = 6
    blur_passes = 4
    #contrast = 1.0
    #brightness = 1.0
    #vibrancy = 1.0
}

# GENERAL
general {

}

# INPUT FIELD
input-field {
    monitor =
    size = 240, 40
    outline_thickness = 2
    dots_size = 0.3 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.4 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(255, 255, 255, 0.2)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = Google Sans Flex Medium
    placeholder_text = <i><span foreground="##ffffff">Enter Password</span></i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    font_family = Cyborg Punk
    position = 140, 340
    halign = left
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 34
    font_family = Google Sans Flex Bold
    position = 140, 220
    halign = left
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = ~/Dotfiles/config/hypr/IMG_20250815_214721_925.jpg
    color = rgba(255, 255, 255, 1.0)
    border_size = 4
    size = 140
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 80
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hello, $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 30
    font_family = Google Sans Flex Medium
    position = 0, -40
    halign = center
    valign = center
}
