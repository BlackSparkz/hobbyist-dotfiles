[general]
live_config_reload = true

[window]
dimensions = { columns = 160, lines = 44 }
padding = { x = 28, y = 24 }
decorations = "none"
dynamic_padding = true

[font]
size = 12.0

[font.normal]
#family = "Google Sans Code NF"
family = "ProFont IIx Nerd Font Mono"
#style = "Regular"

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "beam", blinking = "off" }
thickness = 0.15

[keyboard]
bindings = [
{ key = "V", mods = "Control", action = "Paste" },
#{ key = "C", mods = "Control", action = "Copy" },
]

