layerrule = blur on, match:namespace waybar
#layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace logout_dialog

layerrule {
  name = blur on for layers
  match:namespace = selection
}

monitor=,preferred,auto,1.0

# Set programs that you use
$terminal = kitty
$music = kitty -e cmus
$fileManager = kitty -e yazi
$menu = pkill rofi || rofi -show drun -theme ~/.config/rofi/hyprconfig.rasi
$browser = librewolf

exec-once = kdeconnect-indicator
exec-once = mako
exec-once = $terminal
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = bash $HOME/.config/SwayBg/random-wall.sh
exec-once = waybar -c ~/.config/waybar/Hyprland/config.jsonc -s ~/.config/waybar/Hyprland/style.css

# env = XCURSOR_SIZE,24
# env = HYPRCURSOR_SIZE,24

ecosystem {
  enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 4

    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = none #rgba(255,255,255,0.6)
    col.active_border = rgba(ffffffff)

    resize_on_border = true
    layout = scrolling
}

scrolling {
     fullscreen_on_one_column = true
     column_width = 0.5
   }

decoration {
    rounding = 24
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = true
        size = 8 
        passes = 3
        popups = true
        contrast = 1.6
        noise = 0.0
        brightness = 1.0
        vibrancy = 2.0
        ignore_opacity = true
        new_optimizations = true
    }

    shadow {
      enabled = false
    }
}

# Animations
source = ~/.config/hypr/animations-end4.conf

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    middle_click_paste = true
    disable_hyprland_logo = true
}

input {
    kb_layout = us
    repeat_rate = 60
    repeat_delay = 300

    follow_mouse = 1
    accel_profile = adaptive
    scroll_factor = 3.0
    sensitivity = 1.0
    touchpad {
        natural_scroll = true
        tap-and-drag = true
        scroll_factor = 3.0
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, vertical, workspace

$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod CTRL, T, exec, alacritty
bind = $mainMod, X, exec, $music
bind = $mainMod, R, exec, pkill waybar || waybar -c $HOME/.config/waybar/Hyprland/config.jsonc -s $HOME/.config/waybar/Hyprland/style.css &
bind = $mainMod, Q, killactive,
bind = $mainMod, P, exec, pkill wlogout || wlogout
bind = $mainMod CTRL, R, exec, bash ~/.config/mango/partial_screenshot.sh
bind = $mainMod CTRL, S, exec, bash ~/.config/mango/full_screenshot.sh
bind = $mainMod, W, exec, bash $HOME/.config/SwayBg/random-wall.sh
bind = $mainMod, B, exec, $browser
bind = $mainMod CTRL, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, N, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod CTRL, F, fullscreen,
bind = $mainMod CTRL, O, exec, systemctl poweroff
bind = $mainMod CTRL, M, fullscreen, 0
bind = $mainMod, space, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, workspace, m-1
#bind = $mainMod, down, workspace, e+1
bind = $mainMod, down, workspace, empty

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86Lock, exec, hyprlock

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

