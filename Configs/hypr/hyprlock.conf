background {
    path = screenshot #~/.cache/hyprlock_wall.png
    blur_size = 12
    blur_passes = 4
    contrast = 1.6
    brightness = 0.8
    vibrancy = 1.4
}

general { }

input-field {
    monitor =
    size = 220, 35
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(255, 255, 255, 0.2)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = Google Sans Flex Medium
    placeholder_text = Enter password... 
    fail_text = $PAMFAIL
    hide_input = false
    position = 0, -400
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"─── %H:%M ───")</span>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 100
    #font_family = Cyborg Punk
    font_family = Google Sans Flex Bold
    position = 0, 100
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] ~/.config/Scripts/greet.sh
    color = rgba(ffffffee)
    font_size = 120
    font_family = Betterlett
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"It's %A, %d %B %Y")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 34
    font_family = Google Sans Flex Bold
    position = 0,0
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.config/Resources/images/red_dots.png
    size = 1080 
    rounding = 1
    position = 0,0
    halign = center
    valign = center
}


image {
    monitor =
    path = ~/.config/hypr/IMG_20250815_214721_925.jpg
    color = rgba(255, 255, 255, 1.0)
    border_size = 2
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome back, $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 30
    font_family = Google Sans Flex Medium
    position = 0, -300
    halign = center
    valign = center
}
