background {
    path = screenshot #~/.cache/hyprlock_wall.png
    blur_size = 6
    blur_passes = 4
    contrast = 1.0
    brightness = 0.9
    vibrancy = 1.2
}

general { }

input-field {
    monitor =
    size = 240, 40
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(255, 255, 255, 0.2)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = Google Sans Flex
    placeholder_text = Enter password... 
    fail_text = Try again
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    font_family = Cyborg Punk
    position = 140, 340
    halign = left
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 34
    font_family = Google Sans Flex Bold
    position = 140, 220
    halign = left
    valign = center
}

image {
    monitor =
    path = ~/.config/hypr/IMG_20250815_214721_925.jpg
    color = rgba(255, 255, 255, 1.0)
    border_size = 4
    size = 140
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome back, $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 30
    font_family = Google Sans Flex Medium
    position = 0, -40
    halign = center
    valign = center
}
