# Keybinds
  bind=SUPER,A,spawn,alacritty
  bind=SUPER,B,spawn,librewolf
  bind=SUPER,C,spawn_shell,pkill rofi ||cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
  bind=SUPER,D,spawn,kdeconnect-app
  bind=SUPER,E,spawn,kitty -e bluetui
  bind=SUPER,F,togglefullscreen,
  bind=SUPER,G,spawn,kitty -e btop
  bind=SUPER,H,focusdir,left
  bind=SUPER,I,viewtoright,0
  bind=SUPER,J,focusdir,down
  bind=SUPER,K,focusdir,up
  bind=SUPER,L,focusdir,right
  bind=SUPER,M,spawn,Telegram
  bind=SUPER,N,spawn,kitty -e yazi
  bind=SUPER,O,toggleoverview
  bind=SUPER,P,spawn_shell,pkill wlogout || wlogout
  bind=SUPER,Q,killclient
  bind=SUPER,R,spawn_shell,pkill waybar || waybar -c $HOME/.config/waybar/MangoWC/config.jsonc -s $HOME/.config/waybar/style.css
  bind=SUPER,S,spawn,brave-origin-beta https://www.youtube.com
  bind=SUPER,T,spawn,kitty
  bind=SUPER,U,viewtoleft,0
  bind=SUPER,V,togglefloating,
  bind=SUPER,W,spawn,bash $HOME/.config/Scripts/random_wall_on_home.sh
  bind=SUPER,X,spawn,kitty -e cmus
  bind=SUPER,Y,spawn,kitty -e nmtui
  bind=SUPER,Z,spawn,localsend

  bind=SUPER+ALT,B,spawn,brave-origin-beta
  bind=SUPER,delete,spawn_shell,cliphist wipe
  bind=SUPER,space,spawn_shell,pkill rofi || rofi -show drun
  bind=SUPER+CTRL,E,quit
  bind=SUPER,TAB,switch_layout


  bind=SUPER+SHIFT,R,spawn,bash $HOME/.config/Scripts/screen_recorder.sh
  bindl=SUPER+CTRL,R,spawn,bash $HOME/.config/Scripts/partial_screenshot.sh
  bindl=SUPER+CTRL,S,spawn,bash $HOME/.config/Scripts/full_screenshot.sh

  bind=SUPER,1,comboview,1
  bind=SUPER,2,comboview,2
  bind=SUPER,3,comboview,3
  bind=SUPER,4,comboview,4
  bind=SUPER,5,comboview,5
  bind=SUPER,6,comboview,6
  bind=SUPER,7,comboview,7
  bind=SUPER,8,comboview,8
  bind=SUPER,9,comboview,9

# Mouse Button Bindings
  mousebind=SUPER,btn_left,moveresize,curmove
  mousebind=SUPER,btn_right,moveresize,curresize

# Mouse Wheel Bindings
  axisbind=SUPER,UP,viewtoleft_have_client
  axisbind=SUPER,DOWN,viewtoright_have_client
# bind=SUPER,UP,viewtoleft_have_client
# bind=SUPER,DOWN,viewtoright_have_client

# switch window focus
# bind=SUPER,Down,focusstack,next
# bind=SUPER,Up,focusstack,prev
# # bind=SUPER,Left,focusdir,left
# bind=SUPER,Right,focusdir,right

# swap window
  bind=SUPER+SHIFT,Up,exchange_client,up
  bind=SUPER+SHIFT,Down,exchange_client,down
  bind=SUPER+SHIFT,Left,exchange_client,left
  bind=SUPER+SHIFT,Right,exchange_client,right

# workspace switching
  bind=SUPER+CTRL,Left,tag,next
  bind=SUPER+CTRL,Right,tag,next

# Move windows to workspace
  bind=SUPER+SHIFT,1,tag,1
  bind=SUPER+SHIFT,2,tag,2
  bind=SUPER+SHIFT,3,tag,3
  bind=SUPER+SHIFT,4,tag,4
  bind=SUPER+SHIFT,5,tag,5
  bind=SUPER+SHIFT,6,tag,6
  bind=SUPER+SHIFT,7,tag,7
  bind=SUPER+SHIFT,8,tag,8
  bind=SUPER+SHIFT,9,tag,9

# Gesturebind
  gesturebind=none,left,3,focusdir,left
  gesturebind=none,right,3,focusdir,right
  gesturebind=none,up,3,focusdir,up
  gesturebind=none,down,3,focusdir,down
  gesturebind=none,left,4,viewtoleft_have_client
  gesturebind=none,right,4,viewtoright_have_client
  gesturebind=none,up,4,toggleoverview
  gesturebind=none,down,4,toggleoverview

# # Laptop multimedia keys for volume and LCD brightness
  bind = NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
  bind = NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
  bind = NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
  bind = NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
  bind = NONE,XF86MonBrightnessUp,spawn,brightnessctl s 10%+
  bind = NONE,XF86MonBrightnessDown,spawn,brightnessctl s 10%-

# switch window focus
  bind=ALT,Left,focusdir,left
  bind=ALT,Right,focusdir,right
  bind=ALT,Up,focusdir,up
  bind=ALT,Down,focusdir,down

# swap window
  bind=SUPER+SHIFT,Up,exchange_client,up
  bind=SUPER+SHIFT,Down,exchange_client,down
  bind=SUPER+SHIFT,Left,exchange_client,left
  bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
  bind=ALT,a,togglemaximizescreen,
  bind=ALT,f,togglefullscreen,
  bind=ALT+SHIFT,f,togglefakefullscreen,
# bind=SUPER,i,minimized,
  bind=SUPER+SHIFT,I,restore_minimized
  bind=ALT,space,toggle_scratchpad

# scroller layout
  bind=ALT,e,set_proportion,1.0
  bind=ALT,x,switch_proportion_preset,

# tag switch
# bind=SUPER,up,viewtoleft,0
  bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,down,viewtoright,0
  bind=CTRL,Right,viewtoright_have_client,0
  bind=CTRL+SUPER,Left,tagtoleft,0
  bind=CTRL+SUPER,Right,tagtoright,0

  bind=Ctrl,1,view,1,0
  bind=Ctrl,2,view,2,0
  bind=Ctrl,3,view,3,0
  bind=Ctrl,4,view,4,0
  bind=Ctrl,5,view,5,0
  bind=Ctrl,6,view,6,0
  bind=Ctrl,7,view,7,0
  bind=Ctrl,8,view,8,0
  bind=Ctrl,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
  bind=Alt,1,tag,1,0
  bind=Alt,2,tag,2,0
  bind=Alt,3,tag,3,0
  bind=Alt,4,tag,4,0
  bind=Alt,5,tag,5,0
  bind=Alt,6,tag,6,0
  bind=Alt,7,tag,7,0
  bind=Alt,8,tag,8,0
  bind=Alt,9,tag,9,0

# gaps
  bind=ALT+SHIFT,X,incgaps,10
  bind=ALT+SHIFT,Z,incgaps,-10
  bind=ALT+SHIFT,R,togglegaps

# movewin
  bind=CTRL+SHIFT,Up,movewin,+0,-50
  bind=CTRL+SHIFT,Down,movewin,+0,+50
  bind=CTRL+SHIFT,Left,movewin,-50,+0
  bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
  bind=CTRL+ALT,Up,resizewin,+0,-50
  bind=CTRL+ALT,Down,resizewin,+0,+50
  bind=CTRL+ALT,Left,resizewin,-50,+0
  bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
  mousebind=SUPER,btn_left,moveresize,curmove
  mousebind=NONE,btn_middle,togglemaximizescreen,0
  mousebind=SUPER,btn_right,moveresize,curresize

  bind = ALT,L, spawn,bash $HOME/.config/Scripts/random_wall_on_lockscr.sh
  bind = ALT,W, spawn_shell,pkill rofi || bash $HOME/.config/Scripts/wallpaper_switcher.sh
  bind = ALT,O, spawn_shell,systemctl poweroff
  bind = ALT,R, spawn_shell,systemctl reboot
  bind = ALT,S, spawn_shell,systemctl suspend ; hyprlock
  bindl = ALT,Z, reload_config
  bindl = ALT,B, spawn, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
  bindl = ALT,V, spawn, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
  bindl = ALT,X, spawn, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
  bindl = ALT,C, spawn, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
  bindl = ALT,M, spawn, brightnessctl set 10%+
  bindl = ALT,N, spawn, brightnessctl set 10%-

# Requires playerctl
  bind = NONE,XF86AudioNext,spawn,playerctl next
  bind = NONE,XF86AudioPause,spawn,playerctl play-pause
  bind = NONE,XF86AudioPlay,spawn,playerctl play-pause
  bind = NONE,XF86AudioPrev,spawn,playerctl previous

# Binds for lid fold toggle
  switchbind=fold,spawn_shell,systemctl suspend; bash ~/.config/Scripts/random_wall_on_lockscr.sh
  switchbind=unfold,spawn,wlr-dpms on
