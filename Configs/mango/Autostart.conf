# Start on boot
exec-once=bash $HOME/.config/Scripts/random_wall_on_home.sh
exec-once=mako
exec-once=kitty
exec-once=wl-paste --type image --watch cliphist store
exec-once=wl-paste --type text --watch cliphist store
exec-once=kdeconnect-indicator
exec-once=waybar -c $HOME/.config/waybar/MangoWC/config.jsonc -s $HOME/.config/waybar/MangoWC/style.css
